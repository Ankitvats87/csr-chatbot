name: Diagnose VPS Bot Error

on:
  push:
    paths:
      - ".github/workflows/diagnose.yml"
  workflow_dispatch: {}

jobs:
  diagnose:
    name: Capture VPS logs + reproduce error
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: SSH diagnose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 8m
          script: |
            set -uo pipefail
            cd /opt/csr-bot

            echo "===== 1. WHO LISTENS ON PORT 8000 / 80 / 443 ====="
            ss -ltnp | grep -E ':(8000|80|443)\s' || netstat -ltnp 2>/dev/null | grep -E ':(8000|80|443)\s' || echo "no ss/netstat output"

            echo ""
            echo "===== 2. STRAY PYTHON/UVICORN PROCESSES ON HOST ====="
            ps aux | grep -E 'uvicorn|python.*app' | grep -v grep || echo "none"

            echo ""
            echo "===== 3. ALL CONTAINERS (incl. reverse proxy) ====="
            docker ps -a --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}'

            echo ""
            echo "===== 4. IPv4 vs IPv6 HEALTH ====="
            echo "--- IPv4 127.0.0.1:8000 ---"
            curl -4 -fsS http://127.0.0.1:8000/health || echo "IPv4 FAILED"
            echo ""
            echo "--- IPv6 [::1]:8000 ---"
            curl -6 -fsS "http://[::1]:8000/health" || echo "IPv6 FAILED (nothing on ::1 — good)"

            echo ""
            echo "===== 5. TELEGRAM getWebhookInfo (what Telegram sees) ====="
            TOKEN=$(grep '^TELEGRAM_BOT_TOKEN=' .env | cut -d= -f2-)
            curl -s "https://api.telegram.org/bot${TOKEN}/getWebhookInfo" | python3 -c "
            import json,sys
            d=json.load(sys.stdin).get('result',{})
            for k in ('url','pending_update_count','last_error_date','last_error_message','ip_address'):
                print(f'{k}: {d.get(k)}')
            "

            echo ""
            echo "===== 6. REPRODUCE via explicit IPv4 as authorized user ====="
            curl -4 -s -X POST http://127.0.0.1:8000/webhook/telegram \
              -H "Content-Type: application/json" \
              -H "X-Telegram-Bot-Api-Secret-Token: csr_bot" \
              -d '{"update_id":3,"message":{"message_id":3,"from":{"id":8549159845,"first_name":"Spark"},"chat":{"id":8549159845,"type":"private"},"date":1750000000,"text":"Agenda of 26 CSR meeting"}}'
            echo ""
            echo "(waiting 35s for async pipeline...)"
            sleep 35

            echo ""
            echo "===== 7. APP LOGS since reproduction (last 200 lines) ====="
            docker compose logs --tail=200 app 2>&1 | tail -200
