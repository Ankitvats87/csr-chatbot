name: Diagnose VPS Bot Error

on:
  push:
    paths:
      - ".github/workflows/diagnose.yml"
  workflow_dispatch: {}

jobs:
  diagnose:
    name: Capture VPS logs + reproduce error
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: SSH diagnose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 8m
          script: |
            set -uo pipefail
            cd /opt/csr-bot

            echo "===== 1. CONTAINER STATUS ====="
            docker compose ps

            echo ""
            echo "===== 2. CHUNK STORE FILE (required by hybrid retrieval) ====="
            ls -la data/v2_chunk_store.json 2>&1 || echo "MISSING: data/v2_chunk_store.json"
            ls -la data/ | head -20

            echo ""
            echo "===== 3. HEALTH ====="
            curl -fsS http://localhost:8000/health || echo "HEALTH FAILED"

            echo ""
            echo "===== 4. REPRODUCE: send test query as AUTHORIZED user ====="
            curl -s -X POST http://localhost:8000/webhook/telegram \
              -H "Content-Type: application/json" \
              -H "X-Telegram-Bot-Api-Secret-Token: csr_bot" \
              -d '{"update_id":2,"message":{"message_id":2,"from":{"id":8549159845,"first_name":"Spark"},"chat":{"id":8549159845,"type":"private"},"date":1750000000,"text":"Agenda of 26 CSR meeting"}}'
            echo ""
            echo "(waiting 35s for async pipeline to finish...)"
            sleep 35

            echo ""
            echo "===== 5. APP LOGS (last 250 lines) ====="
            docker compose logs --tail=250 app 2>&1 | tail -250

            echo ""
            echo "===== 5b. INGESTION LOGS (unhealthy container, last 40 lines) ====="
            docker compose logs --tail=40 ingestion 2>&1 | tail -40

            echo ""
            echo "===== 6. KEY ENV FLAGS in container ====="
            docker compose exec -T app printenv | grep -E '^(RAG_VERSION|ENABLE_|LLM_PROVIDER|CHUNK_STORE_PATH|PINECONE_NAMESPACE|TOP_K)' | sort
